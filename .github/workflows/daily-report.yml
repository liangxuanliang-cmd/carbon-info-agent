name: Daily Carbon Report

on:
  schedule:
    # 每天北京时间 5:00 执行 (UTC 21:00)
    - cron: '0 21 * * *'
  workflow_dispatch:
    # 支持手动触发

jobs:
  send-report:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Send daily report to DingTalk
        env:
          DINGTALK_WEBHOOK: ${{ secrets.DINGTALK_WEBHOOK }}
        run: npx tsx scripts/autoUpdate.ts

      - name: Report status
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ 每日简报发送成功"
          else
            echo "❌ 每日简报发送失败"
          fi
