name: Daily Carbon Report

on:
  schedule:
    # 每天北京时间 5:00 执行 (UTC 21:00)
    - cron: '0 21 * * *'
  workflow_dispatch:
    # 支持手动触发

jobs:
  update-and-report:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 允许提交代码
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Update data and send report
        env:
          DINGTALK_WEBHOOK: ${{ secrets.DINGTALK_WEBHOOK }}
          WEBSITE_URL: 'https://carbonhub.netlify.app'
        run: npx tsx scripts/autoUpdate.ts

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/
          if git diff --staged --quiet; then
            echo "✅ 数据文件无变化，无需提交"
          else
            git commit -m "chore: 更新每日碳市场数据 $(date +%Y-%m-%d)"
            git push
            echo "✅ 数据更新已提交到仓库"
          fi

      - name: Report status
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ 每日数据更新和简报发送成功"
          else
            echo "❌ 流程执行失败"
          fi
