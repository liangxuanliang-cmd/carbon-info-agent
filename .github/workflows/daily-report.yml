name: Daily Report Send

on:
  # schedule:
    # 每天北京时间 9:00 执行 (UTC 01:00)
    # - cron: '0 1 * * *'
  workflow_dispatch:

jobs:
  send-report:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Send daily report to DingTalk
        env:
          DINGTALK_WEBHOOK: ${{ secrets.DINGTALK_WEBHOOK }}
          WEBSITE_URL: 'https://carbonhub.netlify.app'
        run: npx tsx scripts/sendDingTalk.ts

      - name: Report status
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ 9点简报发送成功"
          else
            echo "❌ 简报发送失败"
          fi
