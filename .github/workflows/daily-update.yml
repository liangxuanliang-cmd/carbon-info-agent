name: Daily Data Update

on:
  schedule:
    # 每天北京时间 5:00 执行 (UTC 21:00)
    - cron: '0 21 * * *'
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Update data via crawler
        run: npx tsx scripts/updateData.ts

      - name: Commit and push updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/
          if git diff --staged --quiet; then
            echo "✅ 数据文件无变化"
          else
            git commit -m "chore: 更新每日碳市场数据 $(date +%Y-%m-%d)"
            git push
            echo "✅ 数据已更新并推送"
          fi

      - name: Report status
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ 5点数据更新完成"
          else
            echo "❌ 数据更新失败"
          fi
